name: Latest blog post
on:
    schedule:
        # Runs at 9：30pm UTC
        - cron: "30 21 * * *"
    workflow_dispatch:

jobs:
    update-readme-with-blog:
        name: Update this repo's README with latest blog posts
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
            - uses: gautamkrishnar/blog-post-workflow@master
              with:
                  max_post_count: "6"
                  feed_list: "https://igouist.github.io/index.xml"
    update-readme-with-blog-timeline:
        name: Update this repo's README with latest blog timeline
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
            - uses: gautamkrishnar/blog-post-workflow@master
              with:
                  max_post_count: "6"
                  feed_list: "https://igouist.github.io/timeline/index.xml"
                  comment_tag_name: "BLOG-TIMELINE-LIST"
